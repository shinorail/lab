<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車掌スイッチ＆ドア開閉シミュレーター - 篠ノ井乗務区 LAB</title>
    <link rel="stylesheet" href="css/door.css">
</head>
<body>

    <div class="simulator-container">
        <div class="train-window">
            <div class="door-frame">
                <div class="door door-left" id="door-left"></div>
                <div class="door door-right" id="door-right"></div>
            </div>
        </div>

        <div class="conductor-switch-panel">
            <div class="panel-title">車掌スイッチ (ONE-MAN / CONDUCTOR)</div>
            
            <div class="switch-row">
                <div class="switch-group">
                    <span class="switch-label">車掌鍵</span>
                    <button id="key-switch" class="key-btn">🔑 ロック中</button>
                </div>

                <div class="switch-group">
                    <span class="switch-label">ドア開</span>
                    <div class="lever-wrapper">
                        <button id="lever-open" class="lever-btn" disabled>切</button>
                    </div>
                </div>

                <div class="switch-group">
                    <span class="switch-label">ドア閉</span>
                    <button id="btn-close" class="close-btn" disabled>押</button>
                </div>
            </div>

            <div class="status-indicator">
                状態: <span id="status-text">固定（ロック）</span>
            </div>
        </div>
    </div>

    <script src="js/door.js"></script>
</body>
</html>
