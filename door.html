<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>211系仕様 ワンマン運行総合シミュレーター</title>
    <link rel="stylesheet" href="css/door.css">
</head>
<body>

    <div class="roll-sign-unit">
        <div class="oneman-lamp-box">
            <div id="oneman-indicator" class="oneman-lamp">ワンマン</div>
        </div>
        <div class="roll-sign-housing">
            <div class="sign-window type-window">
                <div id="sign-type" class="sign-text">普通</div>
            </div>
            <div class="sign-window dest-window">
                <div id="sign-dest" class="sign-text">松本</div>
            </div>
        </div>
        <button id="btn-roll-sign" class="cab-btn sign-change-btn">🔄 幕回転</button>
    </div>

    <div class="announcement-bar">
        <div id="announcement-text" class="scroll-text">運賃表示器・車掌スイッチシミュレーターへようこそ。</div>
    </div>

    <div class="main-layout">
        
        <div class="left-panel">
            <div class="fare-display">
                <div class="next-station-zone">
                    <span class="label">つぎは</span>
                    <span id="next-station-name" class="station-name">---</span>
                </div>
                <div class="fare-grid" id="fare-grid"></div>
            </div>

            <div class="train-window">
                <div class="door-frame">
                    <div class="door door-left" id="door-left"></div>
                    <div class="door door-right" id="door-right"></div>
                </div>
            </div>
        </div>

        <div class="right-panel">
            
            <div class="ticket-machine-panel">
                <div class="panel-title">整理券発券機 (1駅1枚制限システム)</div>
                <div class="machine-body">
                    <div class="ticket-slot">
                        <div id="ticket-paper" class="ticket-paper">
                            <div class="ticket-title">整理券</div>
                            <div id="ticket-num" class="ticket-number">01</div>
                            <div id="ticket-station" class="ticket-station-name">松本</div>
                        </div>
                    </div>
                    <div class="machine-lamp" id="machine-lamp"></div>
                </div>
                <button id="btn-get-ticket" class="cab-btn ticket-btn" disabled>券を取る</button>
            </div>

            <div class="conductor-panel">
                <div class="panel-title">車掌スイッチ (安全インターロック付)</div>
                <div class="switch-row">
                    <div class="switch-group">
                        <span class="switch-label">車掌鍵</span>
                        <button id="key-switch" class="key-btn">🔑 ロック</button>
                    </div>
                    <div class="switch-group">
                        <span class="switch-label">ドア開</span>
                        <button id="lever-open" class="lever-btn" disabled>切</button>
                    </div>
                    <div class="switch-group">
                        <span class="switch-label">ドア閉</span>
                        <button id="btn-close" class="close-btn" disabled>閉</button>
                    </div>
                </div>
                <div class="status-indicator">ドアインターロック: <span id="status-text">固定</span></div>
            </div>

            <div class="cab-panel">
                <div class="panel-title" style="border:none; margin-bottom:10px;">運転台（運行・合図操作）</div>
                <div class="btn-group">
                    <button id="btn-prev" class="cab-btn">◀ 駅戻る</button>
                    <button id="btn-buzzer" class="cab-btn buzzer-btn">🔔 連絡ブザー (●)</button>
                    <button id="btn-next" class="cab-btn btn-next-station">次駅進む ➔</button>
                </div>
                <p class="status-text">スタフ現在地: <span id="current-station-text">松本駅 停車中</span></p>
            </div>

        </div>
    </div>

    <script src="js/door.js"></script>
</body>
</html>
