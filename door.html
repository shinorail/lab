<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>車掌スイッチシミュレーター - 篠ノ井乗務区 LAB</title>
    <link rel="stylesheet" href="css/door.css">
</head>
<body>

    <div class="conductor-sim-container">
        <div class="column-left">
            <div class="lever-zone">
                <div class="lever-label">閉</div>
                <div class="lever-housing gray-box">
                    <button id="lever-close" class="lever-bar bar-black" disabled></button>
                </div>
            </div>

            <div class="key-panel">
                <div class="key-screw screw-tl"></div>
                <div class="key-screw screw-tr"></div>
                <div class="key-screw screw-bl"></div>
                <div class="key-screw screw-br"></div>
                
                <div class="key-labels">
                    <span class="lbl-auto">自動</span>
                    <span class="lbl-off">切</span>
                    <span class="lbl-semi">半自動</span>
                </div>
                <div id="key-cylinder" class="key-switch-rotary pos-off">
                    <div class="key-line"></div>
                </div>
            </div>

            <div class="lever-zone">
                <div class="lever-housing gray-box">
                    <button id="lever-open" class="lever-bar bar-red" disabled></button>
                </div>
                <div class="lever-label">開</div>
            </div>
        </div>

        <div class="column-right">
            <div class="indicator-lamp" id="door-indicator"></div>

            <div class="buzzer-zone">
                <div class="btn-label-plate">連絡ブザ</div>
                <button id="btn-buzzer" class="round-metal-btn"></button>
            </div>

            <div class="chime-zone">
                <button id="btn-chime" class="plate-btn">促進チャイム</button>
            </div>
        </div>
    </div>

    <script src="js/door.js"></script>
</body>
</html>
