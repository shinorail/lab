<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>211系仕様 高機能ワンマンシミュレーター (運転台)</title>
    <link rel="stylesheet" href="css/door.css">
</head>
<body>

    <div class="menu-bar">
        <a href="settings.html" class="menu-link">⚙ 運行設定画面を開く</a>
    </div>

    <div class="roll-sign-unit">
        <div class="oneman-lamp-box">
            <div id="oneman-indicator" class="oneman-lamp">ワンマン</div>
        </div>
        <div class="roll-sign-housing">
            <div class="sign-window type-window">
                <div id="sign-type" class="sign-text">普通</div>
            </div>
            <div class="sign-window dest-window">
                <div id="sign-dest" class="sign-text">松本</div>
            </div>
        </div>
    </div>

    <div class="announcement-bar">
        <div id="announcement-text" class="scroll-text">まもなく発車いたします。</div>
    </div>

    <div class="main-layout">
        <div class="left-panel">
            <div class="fare-display">
                <div class="next-station-zone">
                    <span class="label">つぎは</span>
                    <span id="next-station-name" class="station-name">---</span>
                </div>
                <div class="fare-grid" id="fare-grid"></div>
            </div>

            <div class="train-window">
                <div class="door-frame">
                    <div class="door door-left" id="door-left"></div>
                    <div class="door door-right" id="door-right"></div>
                </div>
            </div>
        </div>

        <div class="right-panel">
            <div class="ticket-machine-panel">
                <div class="panel-title">整理券発券機 (1駅1枚制限)</div>
                <div class="machine-body">
                    <div class="ticket-slot">
                        <div id="ticket-paper" class="ticket-paper">
                            <div class="ticket-title">整理券</div>
                            <div id="ticket-num" class="ticket-number">01</div>
                            <div id="ticket-station" class="ticket-station-name">松本</div>
                        </div>
                    </div>
                    <div class="machine-lamp" id="machine-lamp"></div>
                </div>
                <button id="btn-get-ticket" class="cab-btn ticket-btn" disabled>券を引き抜く</button>
            </div>

            <div class="conductor-panel">
                <div class="panel-title">車掌スイッチ盤 (3D可動ギミック)</div>
                <div class="switch-row">
                    <div class="switch-group">
                        <span class="switch-label">車掌鍵</span>
                        <div class="key-hole-wrapper" id="key-switch">
                            <div class="key-rotator" id="key-rotator">
                                <div class="key-handle"></div>
                            </div>
                        </div>
                        <span class="sub-label" id="key-status-text">OFF</span>
                    </div>

                    <div class="switch-group">
                        <span class="switch-label">ドア開レバー</span>
                        <div class="lever-track" id="lever-open-zone">
                            <div class="lever-knob" id="lever-knob">
                                <div class="lever-shaft"></div>
                                <div class="lever-head"></div>
                            </div>
                        </div>
                        <span class="sub-label">切 ➔ 入</span>
                    </div>

                    <div class="switch-group">
                        <span class="switch-label">ドア閉ボタン</span>
                        <button id="btn-close" class="real-push-btn" disabled>
                            <span class="btn-top">閉</span>
                        </button>
                        <span class="sub-label">押</span>
                    </div>
                </div>
                <div class="status-indicator">安全構造: <span id="status-text">ロック中</span></div>
            </div>

            <div class="cab-panel">
                <div class="btn-group">
                    <button id="btn-prev" class="cab-btn">◀ 駅戻る</button>
                    <button id="btn-buzzer" class="cab-btn buzzer-btn">🔔 電鈴ブザー</button>
                    <button id="btn-next" class="cab-btn btn-next-station">次駅進む ➔</button>
                </div>
                <p class="status-text">現在地: <span id="current-station-text">停車中</span></p>
            </div>
        </div>
    </div>

    <script src="js/door.js"></script>
</body>
</html>
