<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LED発車標再現シミュレーター（α） - 篠ノ井乗務区</title>
    <link rel="stylesheet" href="css/style.css"> <link rel="stylesheet" href="css/led.css">   </head>
<body>

    <div class="hamburger-btn" id="nav-toggle">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <nav class="global-nav" id="global-nav">
        <ul>
            <li><a href="https://shinorail.github.io/">ホーム</a></li>
            <li><a href="https://shinorail.github.io/main/">メインサイト</a></li>
            <li><a href="https://shinorail.github.io/links/">リンク集</a></li> 
            <li><a href="https://shinorail.github.io/lab/" class="current">ラボ（実験室）</a></li>
        </ul>
    </nav>

    <div class="container" style="max-width: 800px;">
        <a href="index.html" style="color: #00f0c2; text-decoration: none; font-size: 0.9rem; font-weight: bold;">◀ LABホームへ戻る</a>
        <h1 style="margin-top: 10px; margin-bottom: 20px;">LED発車標再現シミュレーター (α)</h1>

        <div class="led-board">
            <div class="led-row" id="row-1">
                <div class="led-time text-orange" id="led-time-1">12:34</div>
                <div class="led-type text-green" id="led-type-1">普通</div>
                <div class="led-name text-orange" id="led-name-1">長野</div>
                <div class="led-car text-green" id="led-car-1">6両</div>
                <div class="led-track text-orange" id="led-track-1">3</div>
            </div>

            <div class="led-row" id="row-2">
                <div class="led-time text-orange" id="led-time-2">13:02</div>
                <div class="led-type text-red" id="led-type-2">特急</div>
                <div class="led-name text-orange" id="led-name-2">しなの12号</div>
                <div class="led-car text-green" id="led-car-2">8両</div>
                <div class="led-track text-orange" id="led-track-2">2</div>
            </div>

            <div class="led-row led-info-row">
                <div class="led-scroll-wrap">
                    <div class="led-scroll-text text-orange" id="scroll-text">
                        【お知らせ】本日も「篠ノ井乗務区 LAB」をご利用いただきまして、ありがとうございます。このツールは現在開発中のアルファ版です。
                    </div>
                </div>
            </div>
        </div>

        <div class="control-panel" style="margin-top: 25px;">
            <h2 style="color: #00f0c2; font-size: 1.2rem; margin-bottom: 15px;">表示内容のカスタム</h2>
            
            <fieldset style="border: 1px solid #555; border-radius: 6px; padding: 15px; margin-bottom: 15px;">
                <legend style="color: #ffaa00; font-weight: bold; padding: 0 5px;">1行目（先発）の変更</legend>
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <div style="flex: 1;">
                        <label>時刻</label>
                        <input type="text" id="input-time-1" value="12:34" maxlength="5">
                    </div>
                    <div style="flex: 1;">
                        <label>種別</label>
                        <select id="input-type-1">
                            <option value="普通" data-color="text-green" selected>普通（緑）</option>
                            <option value="快速" data-color="text-orange">快速（橙）</option>
                            <option value="特急" data-color="text-red">特急（赤）</option>
                        </select>
                    </div>
                    <div style="flex: 2;">
                        <label>列車名・行先</label>
                        <input type="text" id="input-name-1" value="長野">
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label>両数</label>
                        <input type="text" id="input-car-1" value="6両" maxlength="4">
                    </div>
                    <div style="flex: 1;">
                        <label>のりば</label>
                        <input type="text" id="input-track-1" value="3" maxlength="2">
                    </div>
                </div>
            </fieldset>

            <fieldset style="border: 1px solid #555; border-radius: 6px; padding: 15px; margin-bottom: 15px;">
                <legend style="color: #ffaa00; font-weight: bold; padding: 0 5px;">3行目（流れる案内）の変更</legend>
                <label>案内テキスト</label>
                <input type="text" id="input-scroll" value="【お知らせ】本日も「篠ノ井乗務区 LAB」をご利用いただきまして、ありがとうございます。このツールは現在開発中のアルファ版です。" style="width: 100%;">
            </fieldset>
        </div>

        <div class="footer-links">
            <a id="open-terms">利用規約・プライバシーポリシー</a>
        </div>
    </div>

    <div class="modal-overlay" id="terms-modal">
        <div class="modal-content">
            <h2>利用規約・プライバシーポリシー</h2>
            <p>本ツールは駅の電光掲示板を再現するジョーク・シミュレーションツールです。</p>
            <button class="btn-close" id="close-terms">閉じる</button>
        </div>
    </div>

    <script src="js/led.js"></script>
</body>
</html>
