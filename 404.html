<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found - 篠ノ井乗務区</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #111;
            color: #eee;
            text-align: center;
            padding: 80px 20px;
        }
        .error-container {
            max-width: 500px;
            margin: 0 auto;
            border: 3px dashed #ff4444;
            padding: 40px 20px;
            border-radius: 8px;
            background-color: #1e1e1e;
        }
        .error-code {
            font-size: 4rem;
            font-weight: bold;
            color: #ff4444;
            margin: 0;
            line-height: 1;
        }
        .railway-signal {
            font-size: 3rem;
            margin: 20px 0;
        }
        h2 {
            font-size: 1.5rem;
            color: #fff;
        }
        p {
            color: #bbb;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        .btn-home {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #00ffcc;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .btn-home:hover {
            background-color: #00ccaa;
        }
    </style>
</head>
<body>

<div class="error-container">
    <div class="error-code">404</div>
    <div class="railway-signal">🚨🔴🚨</div>
    
    <h2>お探しのページは見つかりません</h2>
    
    <p>
        アクセスされたURLは、すでに廃線（削除）となったか、<br>
        ルートを外れて別の線路（誤入力）に進入した可能性があります。
    </p>
    
    <a href="https://shinorail.github.io/main/" class="btn-home">始発駅（トップページ）へ戻る</a>
</div>

</body>
</html>
